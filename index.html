<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="S. Factor Dance Crew - Your one stop performing art solution. Directed by MAK-E. Connect with us on social media.">
    <meta property="og:title" content="S. Factor Dance Crew">
    <meta property="og:description" content="Your one stop performing art solution - Directed by MAK-E">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="S. Factor Dance Crew">
    <link rel="canonical" href="https://sfactordancecrew.com">
    <meta name="keywords" content="dance crew, performing arts, choreography, S Factor, dance performances, entertainment">
    <meta name="author" content="S. Factor Dance Crew">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#FAFAF7">
    <meta name="msapplication-TileColor" content="#B8172B">
    <title>S. Factor Dance Crew</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" />
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/instagram-card.css">
    
    <!-- JSON-LD Structured Data for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "PerformingGroup",
      "name": "S. Factor Dance Crew",
      "description": "Your one stop performing art solution",
      "founder": {
        "@type": "Person",
        "name": "Sunny Thakur",
        "description": "Founder of S. Factor Dance Crew (In Memoriam)"
      },
      "employee": [
        {
          "@type": "Person",
          "name": "MAK-E",
          "jobTitle": "Director"
        }
      ],
      "sameAs": [
        "https://www.facebook.com/rex.khan3",
        "https://www.instagram.com/s.factordancecrew/",
        "https://t.me/SfactorDanceCrew"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-9340073167",
        "contactType": "customer service",
        "email": "sfactorperformingart@gmail.com"
      },
      "url": "https://sfactordancecrew.com",
      "image": "https://sfactordancecrew.com/sfactor.png"
    }
    </script>
</head>
<body>
    <!-- Frame-by-Frame SVG Loader -->
    <div id="page-loader" class="page-loader" aria-hidden="true">
        <div class="loader-container">
            <div id="loader-frame" class="loader-frame"></div>
        </div>
    </div>
    
    <div class="container">
        <div class="head">
            <h1>S. Factor Dance Crew</h1>
            <div class="subtitle">Your one stop performing art solution</div>
            <div class="proprietor">
                <span class="label">Directed by:</span>
                <span class="name">MAK-E</span>
            </div>
        </div>
        
        <div class="image-container">
            <img src="assets/images/sfactor.png" alt="S. Factor Dance Crew" loading="lazy">
        </div>
        
        <!-- Photo Gallery Section -->
        <section class="gallery-section" aria-label="Performance Gallery">
            <h2 class="gallery-title">
                <i class="fas fa-camera"></i>
                <span>OUR PERFORMANCES</span>
            </h2>
            
            <!-- Instagram-style Card -->
            <div class="instagram-card">
                <!-- Section 1: Card Header -->
                <div class="card-header">
                    <div class="header-left">
                        <div class="profile-avatar"></div>
                        <div class="header-info">
                            <span class="username">sfactor_dance</span>
                            <span class="location"><i class="fas fa-map-marker-alt"></i> Performance Gallery</span>
                        </div>
                    </div>
                    <button class="card-menu" aria-label="More options">
                        <i class="fas fa-ellipsis-h"></i>
                    </button>
                </div>
                
                <!-- Section 2: Media Carousel -->
                <div class="card-media">
                    <div class="media-container">
                        <div class="media-track">
                            <!-- Items will be dynamically inserted by Firebase -->
                        </div>
                    </div>
                    
                    <!-- Carousel Dots -->
                    <div class="carousel-dots" role="tablist" aria-label="Media navigation">
                        <!-- Dots dynamically generated -->
                    </div>
                    
                    <!-- Navigation Arrows (subtle, overlay) -->
                    <button class="media-nav prev" aria-label="Previous">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button class="media-nav next" aria-label="Next">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                    
                    <!-- Mute Button (for videos) -->
                    <button class="mute-btn" aria-label="Toggle sound" style="display: none;">
                        <i class="fas fa-volume-mute"></i>
                    </button>
                    
                    <!-- Video Progress Bar -->
                    <div class="video-progress">
                        <div class="video-progress-bar"></div>
                    </div>
                </div>
                
                <!-- Section 3: Action Bar -->
                <div class="card-actions">
                    <div class="actions-left">
                        <button class="action-btn like-btn" aria-label="Like">
                            <i class="far fa-heart"></i>
                        </button>
                        <button class="action-btn comment-btn" aria-label="Comment">
                            <i class="far fa-comment"></i>
                        </button>
                        <button class="action-btn share-btn" aria-label="Share">
                            <i class="far fa-paper-plane"></i>
                        </button>
                    </div>
                    <button class="action-btn save-btn" aria-label="Save">
                        <i class="far fa-bookmark"></i>
                    </button>
                </div>
                
                <!-- Section 4: Caption -->
                <div class="card-caption">
                    <p class="caption-text">
                        <span class="caption-username">sfactor_dance</span>
                        <span class="caption-content"></span>
                        <button class="caption-more">more</button>
                    </p>
                </div>
                
                <!-- Section 5: Timestamp -->
                <div class="card-timestamp">
                    <span class="timestamp-text"></span>
                </div>
            </div>
            
            <!-- Lightbox Modal -->
            <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Media preview">
                <button class="lightbox-close" aria-label="Close preview">
                    <i class="fas fa-times"></i>
                </button>
                <button class="lightbox-nav prev" aria-label="Previous">
                    <i class="fas fa-chevron-left"></i>
                </button>
                <img src="" alt="" class="lightbox-image" style="display: none;">
                <video class="lightbox-video" controls style="display: none;">
                    <source src="" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <button class="lightbox-nav next" aria-label="Next">
                    <i class="fas fa-chevron-right"></i>
                </button>
                <div class="lightbox-caption"></div>
            </div>
        </section>
        
        <div class="contact-info">
            <h2>CONNECT WITH US</h2>
            <div class="contact-details">
                <div class="contact-item">
                    <i class="fas fa-phone-alt"></i>
                    <span>9340073167</span>
                </div>
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <span>sfactorperformingart@gmail.com</span>
                </div>
            </div>
        </div>

        <div class="links">
            <button aria-label="Connect on Facebook" class="social-btn facebook" data-link="facebook">
                <div class="icon-wrapper">
                    <i class="fa-brands fa-facebook-messenger"></i>
                </div>
                <span>Facebook</span>
            </button>

            <button aria-label="Follow on Instagram" class="social-btn instagram" data-link="instagram">
                <div class="icon-wrapper">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <span>Instagram</span>
            </button>

            <button aria-label="Chat on WhatsApp" class="social-btn whatsapp" data-link="whatsapp">
                <div class="icon-wrapper">
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
                <span>WhatsApp</span>
            </button>

            <button aria-label="Join us on Telegram" class="social-btn telegram" data-link="telegram">
                <div class="icon-wrapper">
                    <i class="fa-brands fa-telegram-plane"></i>
                </div>
                <span>Telegram</span>
            </button>

            <button aria-label="Email us" class="social-btn gmail" data-link="gmail">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-envelope-open-text"></i>
                </div>
                <span>Gmail</span>
            </button>

            <button aria-label="Save Contact" class="social-btn contact" data-link="contact">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-address-book"></i>
                </div>
                <span>Add Contact</span>
            </button>
        </div>

        <div class="end">
            <p>In loving memory of</p>
            <p class="memory-name">SUNNY THAKUR</p>
            <p>Founder of S. Factor Dance Crew</p>
        </div>
    </div>

    <!-- Dance Moves Toggle Button -->
    <button class="dance-toggle" aria-label="Show keyboard dance moves" title="Press ? for dance controls">
        <i class="fas fa-keyboard"></i>
    </button>

    <!-- Check for admin login redirect -->
    <script>
        // Redirect to admin panel if URL contains login parameter
        const currentPath = window.location.pathname;
        const hash = window.location.hash;
        const search = window.location.search;
        
        // Check various login URL patterns
        if (currentPath.endsWith('/login') || 
            currentPath.endsWith('/login.html') ||
            hash === '#/login' || 
            hash === '#login' ||
            search.includes('login') ||
            search.includes('admin')) {
            window.location.href = 'admin.html';
        }
    </script>

    <script type="module" src="assets/js/script.js"></script>
</body>
</html>
